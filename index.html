<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爵士𝚪韻 × 澪標 共催ラストライブ - 宣伝特設ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&family=Montserrat:wght@200;300;400&family=Shippori+Mincho&display=swap" rel="stylesheet">
<style>
  :root {
    --base-bg: #000000; /* 画像の背景色に合わせて黒に設定 */
    --accent-amber: #dca35a;
    --main-text: #ffffff;
    --sub-text: rgba(255, 255, 255, 0.7);
    --border-color: rgba(220, 163, 90, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--base-bg);
    color: var(--main-text);
    font-family: 'Noto Serif JP', serif;
    overflow-x: hidden;
  }

  /* ── ヘッダー/メインビジュアル ── */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: 2rem;
    background-color: #000; /* 画像がない場合の予備色 */
  }

  /* 背景画像レイヤー：画像を正しく表示させるための設定 */
  .hero-bg {
    position: absolute;
    inset: 0;
    /* 画像のURL。HTMLファイルと同じフォルダに「S__3514380.png」を置いてください */
    background-image: url('S__3514380.png');
    background-size: contain; /* 画像全体を表示 */
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
    opacity: 0; /* JSでフェードイン */
    transition: opacity 2s ease-in-out;
  }

  /* 順々に表示されるテキストのスタイル */
  .fade-text {
    position: relative;
    z-index: 3;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease-out;
    /* 黒背景で文字を際立たせる */
    text-shadow: 2px 2px 4px rgba(0,0,0,1);
  }

  .fade-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hero-eyebrow { font-size: 1rem; letter-spacing: 0.5em; color: var(--accent-amber); margin-bottom: 1rem; }
  .hero-subtitle { font-size: 1.5rem; letter-spacing: 0.2em; margin-bottom: 1rem; }
  .hero-title { font-family: 'Shippori Mincho', serif; font-size: clamp(2rem, 8vw, 4rem); line-height: 1.3; margin-bottom: 2rem; }
  .hero-lyrics { font-size: 0.9rem; color: var(--sub-text); font-style: italic; max-width: 600px; line-height: 2; }

  /* ── メンバー紹介以降のセクション ── */
  section.content { padding: 5rem 2rem; max-width: 1000px; margin: 0 auto; }
  .section-title { text-align: center; color: var(--accent-amber); margin-bottom: 3rem; font-size: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;}
  .bands-container { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
  .band-box h3 { margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--accent-amber); }
  .member-list { line-height: 2.5; font-size: 1.1rem; }

  footer { text-align: center; padding: 4rem; border-top: 1px solid var(--border-color); color: var(--sub-text); font-size: 0.8rem; }

  @media (max-width: 768px) {
    .bands-container { grid-template-columns: 1fr; }
    .hero-bg { background-size: cover; } /* スマホでは画面いっぱいに */
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg" id="heroBg"></div>

  <p class="hero-eyebrow fade-text">JAZZ × MIOTSUKUSHI LAST LIVE</p>
  <p class="hero-subtitle fade-text">爵士𝚪韻 × 澪標 共催</p>
  <h1 class="hero-title fade-text">「四月から平士𝚪員、<br>最後まで歌い標」</h1>
  <p class="hero-lyrics fade-text">おしゃべりな波音に誘われたら、君は愛しくなる。<br>あの日交わした密約は、黄昏に消えていく。</p>
</section>

<section class="content">
  <h2 class="section-title">出演メンバー</h2>
  <div class="bands-container">
    <div class="band-box">
      <h3>爵士𝚪韻</h3>
      <div class="member-list">ぼむ、紅葉、ジョモ、カンフォー、ゆき</div>
    </div>
    <div class="band-box">
      <h3>澪標</h3>
      <div class="member-list">おざ、たこぴー、はかせ、しのしの、中田</div>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 爵士𝚪韻 × 澪標 LAST LIVE 「四月から平士𝚪員、最後まで歌い標」</p>
</footer>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const bg = document.getElementById('heroBg');
    const texts = document.querySelectorAll('.fade-text');

    // 1. まず画像をフェードイン
    setTimeout(() => {
      bg.style.opacity = '1';
    }, 300);

    // 2. テキストを上から順に0.7秒おきに表示
    texts.forEach((text, index) => {
      setTimeout(() => {
        text.classList.add('visible');
      }, 1000 + (index * 700)); // 画像が出てから1秒後に開始
    });
  });
</script>
</body>
</html>
